<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDI 音名显示器 · 直接解析版</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
        body { background: #1a2632; min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 16px; }
        .card { background: #2a3745; border-radius: 32px; padding: 28px 24px; max-width: 800px; width: 100%; box-shadow: 0 20px 30px rgba(0,0,0,0.6); border: 1px solid #4a5f73; }
        h1 { color: #f0e6d2; text-align: center; font-weight: 500; margin-top: 0; margin-bottom: 16px; font-size: 2rem; }
        .sub { text-align: center; color: #b8c7d9; margin-bottom: 28px; border-bottom: 1px dashed #4a5f73; padding-bottom: 12px; }
        .button-group { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; }
        button { background: #3b5c7a; border: none; padding: 12px 24px; border-radius: 40px; font-size: 1rem; font-weight: 600; color: #f0e6d2; cursor: pointer; box-shadow: 0 5px 0 #1d3140; transition: 0.08s; border: 1px solid #6a88a3; min-width: 160px; }
        button:active { transform: translateY(4px); box-shadow: 0 1px 0 #1d3140; }
        button:disabled { opacity: 0.4; transform: translateY(4px); pointer-events: none; }
        .device-section { background: #1e2c38; border-radius: 28px; padding: 18px; margin-bottom: 24px; border: 1px solid #4f6b84; }
        .section-title { color: #d4e0ed; font-weight: 500; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .device-list { display: flex; flex-direction: column; gap: 10px; max-height: 200px; overflow-y: auto; padding-right: 6px; }
        .device-item { background: #263a48; border-radius: 40px; display: flex; align-items: center; justify-content: space-between; padding: 8px 16px 8px 20px; border: 1px solid #5c7991; }
        .device-item.connected { background: #2c6e5c; border-color: #b0e6d0; }
        .device-name { color: white; font-weight: 500; word-break: break-word; max-width: 60%; font-size: 0.95rem; }
        .device-name small { font-weight: 300; font-size: 0.7rem; color: #b8c7d9; margin-left: 8px; }
        .connect-btn { background: #3f6a8a; border: none; padding: 6px 20px; border-radius: 30px; font-size: 0.85rem; font-weight: 600; color: white; box-shadow: 0 3px 0 #1e3a4f; cursor: pointer; border: 1px solid #8bb1d1; }
        .connect-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #1e3a4f; }
        .connect-btn.connected-btn { background: #3b8f72; box-shadow: 0 3px 0 #1d523f; border-color: #b1e6cd; }
        .display-area { background: #111e2a; border-radius: 40px; padding: 24px 20px; border: 2px solid #4f6b84; box-shadow: inset 0 0 12px #000000; }
        .label-note { color: #d0dfee; font-size: 0.9rem; margin-bottom: 8px; margin-left: 12px; }
        .note-textbox { width: 100%; background: #0b141f; border: 2px solid #3b5c7a; border-radius: 50px; padding: 16px 24px; font-size: 2.5rem; font-weight: 600; color: #caffbf; text-shadow: 0 0 6px #3b9eff; outline: none; text-align: center; font-family: 'Courier New', monospace; letter-spacing: 4px; }
        .status-bar { display: flex; justify-content: space-between; color: #9cb2c9; margin-top: 12px; font-size: 0.85rem; }
        .status-badge { background: #1e3845; padding: 4px 16px; border-radius: 30px; border: 1px solid #4f7391; }
        .debug-area { background: #1a1e2a; border-radius: 16px; padding: 12px; margin-top: 20px; border: 1px solid #4f6b84; font-family: monospace; font-size: 0.8rem; color: #aaccff; max-height: 120px; overflow-y: auto; white-space: pre-wrap; }
        .footer-note { color: #7f96ab; text-align: center; margin-top: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎹 MIDI 直接解析版</h1>
        <div class="sub">按下琴键 — 显示当前音名 (中央C = C4)</div>

        <div class="button-group">
            <button id="searchMidiBtn">🔍 搜索有线 MIDI</button>
            <button id="searchBluetoothBtn">📡 搜索蓝牙 MIDI</button>
            <button id="disconnectBtn" disabled>🔌 断开设备</button>
            <button id="clearNoteBtn">🗑️ 清除当前音名</button>
        </div>

        <!-- 有线 MIDI 设备列表 -->
        <div class="device-section" id="wiredSection" style="display: none;">
            <div class="section-title">
                🔌 有线 MIDI 输入 <span id="wiredCount">0</span>
            </div>
            <div id="wiredDeviceList" class="device-list">
                <div style="color: #8899aa; text-align: center; padding: 10px;">暂无设备</div>
            </div>
        </div>

        <!-- 蓝牙 MIDI 状态 -->
        <div class="device-section">
            <div class="section-title">
                📶 蓝牙 MIDI 状态
            </div>
            <div id="bluetoothStatus" class="device-list" style="min-height: 60px; justify-content: center;">
                <div style="color: #b0c6db; text-align: center;">未连接</div>
            </div>
        </div>

        <!-- 音名显示 -->
        <div class="display-area">
            <div class="label-note">⌨️ 当前按下的音名 :</div>
            <input type="text" id="noteDisplay" class="note-textbox" readonly value="——">
            <div class="status-bar">
                <span class="status-badge" id="connectionStatus">⚪ 未连接</span>
                <span>🎼 88键: 21(A0) ~ 108(C8)</span>
            </div>
        </div>

        <!-- 调试信息区域 -->
        <div class="debug-area" id="debugInfo">
            等待 MIDI 数据...
        </div>

        <div class="footer-note">
            ⚡ 直接解析：状态 0x90=按下，0x80=松开；音符值显示为十六进制以便对照
        </div>
    </div>

    <script>
        (function() {
            // -------------------- 全局变量 --------------------
            let midiAccess = null;
            let currentInput = null;                    // 当前有线输入
            let bluetoothDevice = null;
            let bluetoothCharacteristic = null;
            let bluetoothConnected = false;
            
            // 当前按下的音符（-1表示无）
            let currentNote = -1;

            // DOM 元素
            const searchMidiBtn = document.getElementById('searchMidiBtn');
            const searchBluetoothBtn = document.getElementById('searchBluetoothBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');
            const clearNoteBtn = document.getElementById('clearNoteBtn');
            const wiredSection = document.getElementById('wiredSection');
            const wiredDeviceList = document.getElementById('wiredDeviceList');
            const wiredCount = document.getElementById('wiredCount');
            const bluetoothStatus = document.getElementById('bluetoothStatus');
            const noteDisplay = document.getElementById('noteDisplay');
            const connectionStatus = document.getElementById('connectionStatus');
            const debugInfo = document.getElementById('debugInfo');

            // 辅助：更新调试信息（追加新行）
            function appendDebug(line) {
                const current = debugInfo.innerText;
                // 限制行数，避免过长
                const lines = current.split('\n');
                if (lines.length > 20) lines.shift();
                lines.push(line);
                debugInfo.innerText = lines.join('\n');
                // 自动滚动到底部
                debugInfo.scrollTop = debugInfo.scrollHeight;
            }

            // 辅助：清空调试信息
            function clearDebug() {
                debugInfo.innerText = '';
            }

            // 辅助：格式化字节数组为十六进制字符串
            function bytesToHex(data) {
                return Array.from(data).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
            }

            // -------------------- 音名转换 (C4 为中央C) --------------------
            function noteNumberToName(note) {
                const names = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
                const octave = Math.floor(note / 12) - 1;
                return `${names[note % 12]}${octave}`;
            }

            // 更新显示
            function updateNoteDisplay() {
                if (currentNote === -1) {
                    noteDisplay.value = '——';
                } else if (currentNote >= 0 && currentNote <= 127) {
                    noteDisplay.value = noteNumberToName(currentNote);
                } else {
                    noteDisplay.value = '??';
                }
            }

            // -------------------- 核心解析函数（直接处理三字节MIDI消息）--------------------
            function parseMidiData(data, source) {
                const hex = bytesToHex(data);
                appendDebug(`[${source}] 收到: ${hex} (长度 ${data.length})`);

                let i = 0;
                while (i < data.length) {
                    // 检查是否可能是一个MIDI状态字节（高位为1）
                    if ((data[i] & 0x80) === 0) {
                        // 不是状态字节，可能是数据流中的额外字节，跳过
                        i++;
                        continue;
                    }

                    const status = data[i];
                    const cmd = status & 0xF0;

                    // 根据常见MIDI消息长度确定需要多少字节
                    let len = 1;
                    if (cmd === 0x80 || cmd === 0x90 || cmd === 0xA0 || cmd === 0xB0 || cmd === 0xE0) {
                        len = 3; // 音符、触后、控制变化、弯音
                    } else if (cmd === 0xC0 || cmd === 0xD0) {
                        len = 2; // 程序变化、通道触后
                    } else {
                        // 其他系统消息（如时钟、开始等）长度不定，这里简单跳过当前字节
                        i++;
                        continue;
                    }

                    // 检查剩余字节是否足够
                    if (i + len > data.length) {
                        appendDebug(`  数据包不完整，期待 ${len} 字节，剩余 ${data.length - i} 字节，停止解析`);
                        break;
                    }

                    // 只处理音符开/关消息
                    if (cmd === 0x90 || cmd === 0x80) {
                        const note = data[i + 1];
                        const velocity = data[i + 2];
                        const noteHex = note.toString(16).padStart(2, '0').toUpperCase();

                        // 检查音符值是否在合理范围（0-127）
                        if (note >= 0 && note <= 127) {
                            if (cmd === 0x90 && velocity > 0) {
                                // 按下
                                appendDebug(`  → 按下: 音符 ${note} (0x${noteHex})，力度 ${velocity}`);
                                currentNote = note;
                            } else {
                                // 松开 (包括 0x80 以及 0x90+力度0)
                                appendDebug(`  → 松开: 音符 ${note} (0x${noteHex})`);
                                if (currentNote === note) {
                                    currentNote = -1;
                                }
                            }
                        } else {
                            appendDebug(`  → 忽略无效音符值: ${note}`);
                        }
                    } else {
                        // 其他消息，可以忽略，但打印调试
                        appendDebug(`  → 忽略非音符消息: 状态 0x${status.toString(16).toUpperCase()}`);
                    }

                    i += len;
                }

                updateNoteDisplay();
            }

            // -------------------- 有线 MIDI --------------------
            async function requestMidiAccess() {
                try {
                    midiAccess = await navigator.requestMIDIAccess({ sysex: false });
                    midiAccess.onstatechange = (event) => {
                        console.log('MIDI端口变化:', event.port.name, event.port.state);
                        renderWiredDeviceList();
                        if (currentInput && !Array.from(midiAccess.inputs.values()).some(i => i.id === currentInput.id)) {
                            disconnectCurrentDevice();
                        }
                    };
                    renderWiredDeviceList();
                } catch (err) {
                    console.error('MIDI访问失败:', err);
                    alert('无法访问MIDI设备：' + err.message);
                }
            }

            function renderWiredDeviceList() {
                if (!midiAccess) {
                    wiredSection.style.display = 'none';
                    return;
                }
                const inputs = midiAccess.inputs;
                const inputArray = Array.from(inputs.values());
                wiredCount.textContent = inputArray.length;

                if (inputArray.length === 0) {
                    wiredDeviceList.innerHTML = '<div style="color: #8899aa; text-align: center; padding: 10px;">未找到有线MIDI设备</div>';
                    wiredSection.style.display = 'block';
                    return;
                }

                wiredSection.style.display = 'block';
                let html = '';
                inputArray.forEach(input => {
                    const isConnected = (currentInput && currentInput.id === input.id);
                    html += `
                        <div class="device-item ${isConnected ? 'connected' : ''}" data-device-id="${input.id}" data-type="wired">
                            <span class="device-name">
                                ${input.name || '未知设备'} <small>${input.manufacturer || ''}</small>
                            </span>
                            <button class="connect-btn ${isConnected ? 'connected-btn' : ''}" data-device-id="${input.id}" data-type="wired">
                                ${isConnected ? '已连接' : '连接'}
                            </button>
                        </div>
                    `;
                });
                wiredDeviceList.innerHTML = html;
            }

            function connectWiredDevice(input) {
                if (currentInput && currentInput.id === input.id) return;

                disconnectCurrentDevice();
                clearDebug();

                input.onmidimessage = (event) => {
                    parseMidiData(event.data, 'wired');
                };
                currentInput = input;
                connectionStatus.innerHTML = `🟢 已连接: ${input.name || '有线设备'}`;
                disconnectBtn.disabled = false;

                renderWiredDeviceList();
                if (bluetoothConnected) disconnectBluetooth();
            }

            // -------------------- 蓝牙 MIDI --------------------
            async function connectBluetooth() {
                if (!navigator.bluetooth) {
                    alert('浏览器不支持 Web Bluetooth。请使用 Chrome/Edge。');
                    return;
                }

                try {
                    bluetoothStatus.innerHTML = '<div style="color: #b0c6db; text-align: center;">⏳ 搜索设备...</div>';

                    const device = await navigator.bluetooth.requestDevice({
                        filters: [
                            { services: ['03b80e5a-ede8-4b33-a751-6ce34ec4c700'] },
                            { namePrefix: 'MIDI' },
                            { namePrefix: 'BTM' },
                            { namePrefix: 'Bluetooth MIDI' }
                        ],
                        optionalServices: ['03b80e5a-ede8-4b33-a751-6ce34ec4c700']
                    });

                    const server = await device.gatt.connect();
                    const service = await server.getPrimaryService('03b80e5a-ede8-4b33-a751-6ce34ec4c700');
                    const characteristic = await service.getCharacteristic('7772e5db-3868-4112-a1a9-f2669d106bf3');

                    characteristic.addEventListener('characteristicvaluechanged', (event) => {
                        const value = event.target.value;
                        const data = new Uint8Array(value.buffer);
                        parseMidiData(data, 'bluetooth');
                    });

                    await characteristic.startNotifications();

                    bluetoothDevice = device;
                    bluetoothCharacteristic = characteristic;
                    bluetoothConnected = true;
                    clearDebug();

                    device.addEventListener('gattserverdisconnected', () => {
                        bluetoothConnected = false;
                        bluetoothDevice = null;
                        bluetoothCharacteristic = null;
                        bluetoothStatus.innerHTML = '<div style="color: #b0c6db; text-align: center;">未连接</div>';
                        if (!currentInput) {
                            connectionStatus.innerHTML = '⚪ 未连接';
                            disconnectBtn.disabled = true;
                        }
                        appendDebug('蓝牙设备已断开');
                    });

                    bluetoothStatus.innerHTML = `<div style="color: #a5d6a5; text-align: center;">✅ 已连接: ${device.name || '蓝牙设备'}</div>`;
                    connectionStatus.innerHTML = `🟢 蓝牙已连接: ${device.name || '未知'}`;
                    disconnectBtn.disabled = false;

                    if (currentInput) disconnectCurrentDevice();

                } catch (error) {
                    console.error('蓝牙连接失败:', error);
                    bluetoothStatus.innerHTML = '<div style="color: #cc8888; text-align: center;">❌ 连接失败/取消</div>';
                }
            }

            function disconnectBluetooth() {
                if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                    bluetoothDevice.gatt.disconnect();
                }
                bluetoothConnected = false;
                bluetoothDevice = null;
                bluetoothCharacteristic = null;
                bluetoothStatus.innerHTML = '<div style="color: #b0c6db; text-align: center;">未连接</div>';
            }

            // -------------------- 通用断开 --------------------
            function disconnectCurrentDevice() {
                if (currentInput) {
                    currentInput.onmidimessage = null;
                    currentInput = null;
                }
                disconnectBluetooth();

                currentNote = -1;
                updateNoteDisplay();
                connectionStatus.innerHTML = '⚪ 未连接';
                disconnectBtn.disabled = true;
                renderWiredDeviceList();
                clearDebug();
                appendDebug('已断开连接');
            }

            // -------------------- 事件绑定 --------------------
            searchMidiBtn.addEventListener('click', requestMidiAccess);

            searchBluetoothBtn.addEventListener('click', connectBluetooth);

            disconnectBtn.addEventListener('click', disconnectCurrentDevice);

            clearNoteBtn.addEventListener('click', () => {
                currentNote = -1;
                updateNoteDisplay();
                appendDebug('手动清除当前音名');
            });

            wiredDeviceList.addEventListener('click', (e) => {
                const btn = e.target.closest('.connect-btn');
                if (!btn) return;
                const deviceId = btn.dataset.deviceId;
                if (!midiAccess) return;
                for (let input of midiAccess.inputs.values()) {
                    if (input.id === deviceId) {
                        connectWiredDevice(input);
                        break;
                    }
                }
            });

            window.addEventListener('beforeunload', () => {
                if (currentInput) currentInput.onmidimessage = null;
                if (bluetoothDevice && bluetoothDevice.gatt.connected) bluetoothDevice.gatt.disconnect();
            });

            if (!navigator.requestMIDIAccess) {
                appendDebug('⚠️ 浏览器不支持 Web MIDI API，有线MIDI不可用');
            }
        })();
    </script>
</body>
</html>
