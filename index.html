<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝牙MIDI钢琴音名显示器 · 增强版</title>
    <style>
        /* 样式基本同前，略作优化 */
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
        body { background: #1d2a35; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; margin: 0; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); border-radius: 40px; padding: 28px 24px; max-width: 750px; width: 100%; border: 1px solid rgba(255,255,255,0.2); }
        h1 { color: #f2e9d0; text-align: center; font-weight: 500; }
        .sub { text-align: center; color: #c0b7a1; margin-bottom: 28px; border-bottom: 1px dashed #5f6b7a; padding-bottom: 12px; }
        .control-panel { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-bottom: 30px; }
        button { background: #3e5a70; border: none; padding: 14px 28px; border-radius: 60px; font-size: 1.1rem; font-weight: 600; color: #f0ebdd; cursor: pointer; box-shadow: 0 8px 0 #1d2c38, 0 6px 12px black; transition: all 0.08s; border: 1px solid #7c8f9e; }
        button:active { transform: translateY(6px); box-shadow: 0 2px 0 #1d2c38; }
        button:disabled { opacity: 0.4; transform: translateY(4px); pointer-events: none; }
        .device-section { background: #1e2b36c9; border-radius: 36px; padding: 20px 18px; margin-bottom: 28px; border: 1px solid #608094; }
        .section-title { color: #dcd3c0; font-weight: 500; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .section-title span { background: #097e8d; padding: 4px 14px; border-radius: 50px; font-size: 0.8rem; color: white; }
        .device-list { display: flex; flex-direction: column; gap: 12px; max-height: 240px; overflow-y: auto; padding-right: 6px; }
        .device-item { background: #25333f; border-radius: 50px; display: flex; align-items: center; justify-content: space-between; padding: 8px 16px 8px 22px; border: 1px solid #5e768a; box-shadow: 0 4px 6px #00000033; }
        .device-item.connected { background: #2b6d5c; border-color: #b9e6d0; box-shadow: 0 0 12px #6df0c0; }
        .device-name { color: white; font-weight: 500; word-break: break-word; max-width: 60%; }
        .device-name small { font-weight: 300; font-size: 0.75rem; color: #b7c7d4; margin-left: 10px; }
        .connect-btn { background: #326a82; border: none; padding: 8px 22px; border-radius: 40px; font-size: 0.9rem; font-weight: 600; color: white; box-shadow: 0 4px 0 #14313e; cursor: pointer; border: 1px solid #96b8cd; }
        .connect-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #14313e; }
        .connect-btn.connected-btn { background: #3f8b6b; box-shadow: 0 4px 0 #1d4a38; border-color: #b1e6cd; }
        .display-area { background: #17212b; border-radius: 48px; padding: 26px 20px; border: 2px solid #5d7e97; box-shadow: inset 0 0 15px #000000, 0 10px 10px rgba(0,0,0,0.5); }
        .label-note { color: #e6dccb; font-size: 0.9rem; margin-bottom: 6px; margin-left: 12px; }
        .note-textbox { width: 100%; background: #0c141c; border: 3px solid #3e5a6b; border-radius: 60px; padding: 18px 28px; font-size: 2.2rem; font-weight: 600; color: #c3ffb2; text-shadow: 0 0 8px #00d0ff; outline: none; text-align: center; font-family: 'Courier New', monospace; }
        .info-footer { display: flex; justify-content: space-between; color: #9aaec0; margin-top: 12px; font-size: 0.85rem; }
        .status-badge { background: #1e3a3f; padding: 6px 18px; border-radius: 40px; border: 1px solid #5499b3; }
        .warning-banner { background: #5d3a2b; color: #ffd8b0; padding: 10px 20px; border-radius: 40px; margin-bottom: 20px; text-align: center; border: 1px solid #b87c4c; }
    </style>
</head>
<body>
<div class="card">
    <h1>🎹 蓝牙MIDI · 增强诊断版</h1>
    <div class="sub">按下琴键实时显示音名 (A0 ~ C8)</div>

    <!-- 兼容性警告区域（动态显示） -->
    <div id="compatibilityWarning" class="warning-banner" style="display: none;">⚠️ 您的浏览器不支持 Web MIDI API，请使用 Chrome 或 Edge。</div>

    <div class="control-panel">
        <button id="searchBtn">🔍 搜索蓝牙MIDI设备</button>
        <button id="disconnectBtn" class="disconnect-all" disabled>🔌 断开当前设备</button>
    </div>

    <div class="device-section">
        <div class="section-title">
            📡 可用MIDI输入设备
            <span id="deviceCount">0</span>
        </div>
        <div id="deviceListContainer" class="device-list">
            <div style="color: #8899aa; text-align: center; padding: 20px;">点击「搜索」并确保蓝牙MIDI已配对</div>
        </div>
        <!-- 增加状态提示行 -->
        <div id="midiStatusHint" style="color: #aabbcc; font-size: 0.9rem; margin-top: 12px; text-align: center;"></div>
    </div>

    <div class="display-area">
        <div class="label-note">⌨️ 当前按下的琴键 (音名) :</div>
        <input type="text" id="noteDisplay" class="note-textbox" readonly value="—— 无 ——">
        <div class="info-footer">
            <span class="status-badge" id="connectionStatus">⚪ 未连接</span>
            <span>🎼 范围: 21(A0) ~ 108(C8)</span>
        </div>
    </div>
</div>

<script>
(function() {
    // ----- 检测浏览器兼容性 -----
    if (!navigator.requestMIDIAccess) {
        document.getElementById('compatibilityWarning').style.display = 'block';
        // 禁用搜索按钮
        document.getElementById('searchBtn').disabled = true;
        // 显示提示信息
        document.getElementById('midiStatusHint').innerText = '❌ 当前浏览器不支持Web MIDI API。请使用Chrome或Edge。';
        return; // 停止执行后续代码
    }

    // ----- 变量定义 -----
    let midiAccess = null;
    let currentInput = null;
    const activeNotes = new Set();
    let connectedDeviceId = null;

    const searchBtn = document.getElementById('searchBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const deviceListContainer = document.getElementById('deviceListContainer');
    const deviceCountSpan = document.getElementById('deviceCount');
    const noteDisplay = document.getElementById('noteDisplay');
    const connectionStatusSpan = document.getElementById('connectionStatus');
    const midiStatusHint = document.getElementById('midiStatusHint');

    // ----- 辅助函数: MIDI note -> 音名 -----
    function noteNumberToName(note) {
        const names = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const octave = Math.floor(note / 12) - 1;
        return `${names[note % 12]}${octave}`;
    }

    function updateNoteDisplay() {
        if (activeNotes.size === 0) {
            noteDisplay.value = '—— 无 ——';
            return;
        }
        const sorted = Array.from(activeNotes).sort((a,b)=>a-b);
        noteDisplay.value = sorted.map(n => noteNumberToName(n)).join('  ·  ');
    }

    // ----- MIDI消息处理 -----
    function handleMIDIMessage(event) {
        const [status, note, velocity] = event.data;
        const cmd = status & 0xF0;
        if (cmd === 0x90 && velocity > 0) activeNotes.add(note);
        else activeNotes.delete(note);
        updateNoteDisplay();
    }

    // ----- 断开连接 -----
    function disconnectCurrentDevice() {
        if (currentInput) {
            currentInput.onmidimessage = null;
            currentInput = null;
        }
        activeNotes.clear();
        updateNoteDisplay();
        connectedDeviceId = null;
        connectionStatusSpan.innerHTML = '⚪ 未连接';
        disconnectBtn.disabled = true;

        // 移除所有高亮
        document.querySelectorAll('.device-item').forEach(item => {
            item.classList.remove('connected');
            const btn = item.querySelector('.connect-btn');
            if (btn) {
                btn.classList.remove('connected-btn');
                btn.textContent = '连接';
            }
        });
    }

    // ----- 连接指定设备 -----
    function connectDevice(input) {
        if (currentInput && currentInput.id === input.id) return;
        disconnectCurrentDevice();

        try {
            input.onmidimessage = handleMIDIMessage;
            currentInput = input;
            connectedDeviceId = input.id;

            const deviceName = input.name || input.manufacturer || '未知设备';
            connectionStatusSpan.innerHTML = `🟢 已连接: ${deviceName.substring(0,20)}`;
            disconnectBtn.disabled = false;

            // 高亮对应的设备项
            document.querySelectorAll('.device-item').forEach(item => {
                const btn = item.querySelector('.connect-btn');
                const itemId = item.dataset.deviceId;
                if (itemId === input.id) {
                    item.classList.add('connected');
                    if (btn) {
                        btn.classList.add('connected-btn');
                        btn.textContent = '已连接';
                    }
                } else {
                    item.classList.remove('connected');
                    if (btn) {
                        btn.classList.remove('connected-btn');
                        btn.textContent = '连接';
                    }
                }
            });

            midiStatusHint.innerText = `✅ 已连接至 ${deviceName}`;
        } catch (e) {
            console.error('连接失败:', e);
            midiStatusHint.innerText = `❌ 连接失败: ${e.message}`;
        }
    }

    // ----- 渲染设备列表 -----
    function renderDeviceList() {
        if (!midiAccess) {
            deviceListContainer.innerHTML = '<div style="color: #8899aa; text-align: center; padding: 20px;">🎯 请先点击「搜索蓝牙MIDI设备」</div>';
            deviceCountSpan.innerText = '0';
            midiStatusHint.innerText = '🔵 点击搜索以请求MIDI权限';
            return;
        }

        const inputs = midiAccess.inputs;
        const inputArray = Array.from(inputs.values());
        deviceCountSpan.innerText = inputArray.length;

        if (inputArray.length === 0) {
            deviceListContainer.innerHTML = '<div style="color: #ccaa88; text-align: center; padding: 20px;">📭 没有找到MIDI设备<br>👉 请确认：<br>1. 蓝牙MIDI已配对并开启<br>2. 已点击“允许”权限<br>3. 设备在系统蓝牙中显示已连接</div>';
            midiStatusHint.innerText = '⚠️ 设备列表为空，请检查系统蓝牙配对和权限';
            return;
        }

        let htmlStr = '';
        inputArray.forEach(input => {
            const deviceName = input.name || '未命名设备';
            const manufacturer = input.manufacturer || '未知厂商';
            const deviceId = input.id;
            const isConnected = (currentInput && currentInput.id === deviceId);

            htmlStr += `
                <div class="device-item ${isConnected ? 'connected' : ''}" data-device-id="${deviceId}">
                    <span class="device-name">
                        ${deviceName} <small>${manufacturer}</small>
                    </span>
                    <button class="connect-btn ${isConnected ? 'connected-btn' : ''}" data-device-id="${deviceId}">
                        ${isConnected ? '已连接' : '连接'}
                    </button>
                </div>
            `;
        });

        deviceListContainer.innerHTML = htmlStr;
        midiStatusHint.innerText = `🔎 找到 ${inputArray.length} 个设备，点击「连接」使用`;
    }

    // ----- 搜索设备 (请求MIDI访问) -----
    async function searchMIDIDevices() {
        disconnectCurrentDevice();
        midiStatusHint.innerText = '⏳ 请求MIDI访问权限...';

        try {
            midiAccess = await navigator.requestMIDIAccess({ sysex: false });
            console.log('MIDI Access granted', midiAccess);

            midiAccess.onstatechange = (event) => {
                console.log('端口状态变化:', event.port);
                // 如果当前连接的设备断开，自动清理
                if (currentInput) {
                    const stillExists = Array.from(midiAccess.inputs.values()).some(i => i.id === currentInput.id);
                    if (!stillExists) disconnectCurrentDevice();
                }
                renderDeviceList();
            };

            renderDeviceList();
        } catch (err) {
            console.error('MIDI访问失败:', err);
            midiAccess = null;
            deviceListContainer.innerHTML = '<div style="color: #ffaa88; text-align: center; padding: 20px;">❌ 无法获取MIDI设备权限。<br>请允许权限并重试。</div>';
            deviceCountSpan.innerText = '0';
            midiStatusHint.innerText = '❌ 权限被拒绝或发生错误: ' + err.message;
        }
    }

    // ----- 事件绑定 -----
    searchBtn.addEventListener('click', searchMIDIDevices);

    disconnectBtn.addEventListener('click', () => {
        disconnectCurrentDevice();
        renderDeviceList(); // 刷新按钮样式
        midiStatusHint.innerText = '⏸️ 已断开连接';
    });

    deviceListContainer.addEventListener('click', (e) => {
        const btn = e.target.closest('.connect-btn');
        if (!btn) return;
        const deviceId = btn.dataset.deviceId;
        if (!midiAccess) {
            alert('请先点击搜索获取设备列表');
            return;
        }

        const inputs = midiAccess.inputs;
        let targetInput = null;
        for (let input of inputs.values()) {
            if (input.id === deviceId) {
                targetInput = input;
                break;
            }
        }

        if (targetInput) {
            if (currentInput && currentInput.id === deviceId) return; // 已连接
            connectDevice(targetInput);
        } else {
            alert('设备不存在，请重新搜索');
        }
    });

    // 初始状态提示
    midiStatusHint.innerText = '🔵 点击「搜索蓝牙MIDI设备」开始';
})();
</script>
</body>
</html>
