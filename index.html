<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- 1-10: 基础HTML结构和元数据 -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>五线谱绘制工具 - 钢琴键盘版 (蓝牙MIDI重写)</title>
  
  <!-- 11-15: 外部资源引入 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  
  <style>
    /* 原有样式保持不变，省略以节省篇幅，实际使用时需保留全部样式 */

  </style>

</head>
<body class="no-zoom">
  <!-- 顶部菜单栏、主绘图区域等原有结构保持不变，省略以节省篇幅 -->
  <!-- 实际使用时需保留所有原有HTML结构，仅修改MIDI设置模态框部分 -->
  
  <!-- 此处省略了原有HTML结构，仅保留MIDI设置模态框的修改版本 -->
  <!-- 注意：原HTML中其他部分（如线条设置、谱号设置等）需完整保留 -->
  
  <!-- 2951-3000: MIDI设备设置模态框结构（已集成蓝牙MIDI，去除优化参数） -->
  <div id="midi-settings-container">
    <div class="modal-backdrop" id="midi-settings-modal">
      <div class="modal-content">
        <h2 class="text-xl font-semibold text-gray-800 mb-5 flex items-center">
          <i class="fa fa-plug mr-2 text-blue-600"></i>MIDI设备设置
        </h2>
        
        <!-- MIDI设备选择 -->
        <div class="slider-wrapper">
          <div class="slider-label">
            <span>选择MIDI设备</span>
          </div>
          <select id="midi-device-select" class="w-full p-2 border border-gray-300 rounded-lg">
            <option value="">-- 请选择MIDI设备 --</option>
          </select>
        </div>
        
        <!-- MIDI设备状态 -->
        <div class="slider-wrapper">
          <div class="slider-label">
            <span>设备状态</span>
            <span id="midi-device-status" class="text-sm font-mono midi-disconnected">未连接</span>
          </div>
        </div>
        
        <!-- MIDI音符显示 -->
        <div class="slider-wrapper">
          <div class="slider-label">
            <span>最近MIDI音符</span>
            <span id="midi-note-display" class="text-sm font-mono">-</span>
          </div>
        </div>
        
        <!-- 启用MIDI输入控制 -->
        <div class="slider-wrapper flex items-center justify-between">
          <label class="text-sm font-medium text-gray-600">启用MIDI输入</label>
          <input 
            type="checkbox" 
            id="enable-midi-input" 
            class="w-5 h-5 accent-blue-600"
            checked
          >
        </div>
        
        <!-- MIDI音符对比控制 -->
        <div class="slider-wrapper flex items-center justify-between">
          <label class="text-sm font-medium text-gray-600">启用MIDI音符对比</label>
          <input 
            type="checkbox" 
            id="midi-note-compare" 
            class="w-5 h-5 accent-blue-600"
            checked
          >
        </div>
        
        <!-- 蓝牙 MIDI 设置区域（新增） -->
        <div class="slider-wrapper border-t border-slate-700 pt-4 mt-4">
          <h3 class="text-lg font-semibold mb-4 text-secondary flex items-center">
            <i class="fa fa-bluetooth mr-2 text-blue-600"></i>蓝牙 MIDI 设置
          </h3>
          
          <!-- 蓝牙连接状态显示 -->
          <div class="flex items-center justify-between mb-3">
            <span class="text-sm font-medium text-gray-600">蓝牙 MIDI 状态</span>
            <span id="bluetooth-midi-status" class="text-sm font-mono text-gray-400">未连接</span>
          </div>
          
          <!-- 蓝牙连接按钮 -->
          <div class="flex gap-2 mb-4">
            <button id="connect-bluetooth-midi" class="flex-1 btn-primary bg-blue-600 hover:bg-blue-700">
              <i class="fa fa-bluetooth mr-2"></i>连接蓝牙 MIDI 设备
            </button>
            <button id="disconnect-bluetooth-midi" class="flex-1 btn-primary bg-gray-600 hover:bg-gray-700" disabled>
              <i class="fa fa-times mr-2"></i>断开连接
            </button>
          </div>
          
          <p class="text-xs text-gray-400 mt-2">
            当有线 MIDI 设备连接时，蓝牙 MIDI 将被自动禁用（连接按钮不可用）。
          </p>
        </div>
        
        <!-- 按钮区域 -->
        <div class="flex space-x-3 mt-4">
          <button id="midi-refresh-btn" class="flex-1 btn-primary bg-gray-600 hover:bg-gray-700">
            <i class="fa fa-refresh mr-2"></i>刷新设备
          </button>
          <button id="midi-close-btn" class="flex-1 btn-primary">
            <i class="fa fa-check mr-2"></i>确定
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 随机范围设置模态框等其他结构保持不变，此处省略 -->
  
  <script>
    // ======================================================================
    // 3051-3100: JavaScript代码 - DOM元素获取和变量定义
    // ======================================================================
    // 原有 DOM 元素获取保持不变，此处仅列出新增的蓝牙元素引用
    // 注意：原代码中已有 midiSettingsContainer 等元素，此处需在变量定义部分添加蓝牙相关元素
    // 请确保将以下变量添加到原有变量定义区域（约3051-3100行）
    
    // 蓝牙MIDI元素（新增）
    const connectBluetoothMidiBtn = document.getElementById('connect-bluetooth-midi');
    const disconnectBluetoothMidiBtn = document.getElementById('disconnect-bluetooth-midi');
    const bluetoothMidiStatus = document.getElementById('bluetooth-midi-status');
    
    // ======================================================================
    // 3101-3150: 常量定义和配置对象
    // ======================================================================
    // 修改 midiProps 对象，添加蓝牙相关属性
    let midiProps = {
      enabled: true,           // 是否启用MIDI输入（默认启用）
      access: null,            // MIDI访问对象
      inputs: [],              // MIDI输入设备列表
      selectedInput: null,     // 选中的MIDI输入设备
      noteCompare: true,       // MIDI音符对比功能
      lastNote: null,          // 最后一个MIDI音符
      activeNotes: new Set(),  // 当前活动的MIDI音符
      preferWired: true,       // 是否优先有线
      // 蓝牙相关
      bluetoothDevice: null,
      bluetoothCharacteristic: null,
      isBluetoothConnected: false,
      lastBluetoothMessageTime: 0,
      debug: true              // 调试开关，可关闭
    };
    
    // ======================================================================
    // 3201-3250: 工具函数定义（原有，保持不变）
    // ======================================================================
    // ... 原有 getCurrentPitchNames 等函数保持不变 ...
    
    // ======================================================================
    // 3551-3600: 核心功能函数 - 绘制功能
    // ======================================================================
    // 修改 updateMidiStatus 函数，使其显示具体设备名称和类型
    function updateMidiStatus() {
      if (!midiProps.enabled) {
        midiStatus.classList.remove('midi-connected');
        midiStatus.classList.add('midi-disconnected');
        midiStatusText.textContent = 'MIDI输入未启用';
        return;
      }
      
      if (midiProps.selectedInput) {
        midiStatus.classList.remove('midi-disconnected');
        midiStatus.classList.add('midi-connected');
        const type = midiProps.selectedInput.isBluetooth ? '蓝牙' : '有线';
        midiStatusText.textContent = `${type}MIDI已连接: ${midiProps.selectedInput.name}`;
      } else {
        midiStatus.classList.remove('midi-connected');
        midiStatus.classList.add('midi-disconnected');
        midiStatusText.textContent = '未选择MIDI设备';
      }
    }
    
    // ======================================================================
    // 3901-3950: 核心功能函数 - MIDI操作（重写）
    // ======================================================================
    
    /**
     * 处理 MIDI 音符事件（通用，有线/蓝牙共用）
     * @param {Uint8Array} data - MIDI 消息数据
     * @param {boolean} isBluetooth - 是否来自蓝牙
     */
    function processMidiNote(data, isBluetooth = false) {
      if (!midiProps.enabled) {
        if (midiProps.debug) console.log('MIDI输入未启用，忽略消息');
        return;
      }
      
      if (data.length < 3) return;
      const [command, note, velocity] = data;
      if (midiProps.debug) console.log(`MIDI: cmd=${command}, note=${note}, vel=${velocity}, 蓝牙=${isBluetooth}`);
      
      if ((command & 0xf0) === 0x90 && velocity > 0) {
        // 音符开
        const pitchName = midiNoteToPitch[note];
        if (pitchName) {
          midiNoteDisplay.textContent = `${pitchName} (${note})`;
          midiProps.lastNote = pitchName;
          midiProps.activeNotes.add(note);
          highlightPianoKey(pitchName, true);
          
          if (midiProps.noteCompare) {
            const currentNoteName = pitchText.textContent.replace('音名：', '');
            if (pitchName === currentNoteName) {
              showFeedback('正确！', true);
              setTimeout(() => randomMoveNote(), 500);
            } else {
              showFeedback('错了！', false);
            }
          }
        }
      } else if (((command & 0xf0) === 0x80) || (((command & 0xf0) === 0x90) && velocity === 0)) {
        // 音符关
        midiProps.activeNotes.delete(note);
        const pitchName = midiNoteToPitch[note];
        if (pitchName) highlightPianoKey(pitchName, false);
      }
    }
    
    /**
     * 处理有线 MIDI 输入
     * @param {Event} event - MIDI 事件
     */
    function handleMidiMessage(event) {
      processMidiNote(event.data, false);
    }
    
    /**
     * 高亮对应的钢琴键
     * @param {string} pitchName - 音名
     * @param {boolean} isActive - 是否激活
     */
    function highlightPianoKey(pitchName, isActive) {
      const key = pianoProps.keys.find(k => k.name === pitchName);
      if (key) {
        if (isActive) {
          key.element.classList.add('midi-active');
        } else {
          key.element.classList.remove('midi-active');
        }
      }
    }
    
    // ======================================================================
    // 3951-4000: 核心功能函数 - MIDI设备管理（重写）
    // ======================================================================
    
    /**
     * 请求MIDI访问权限
     * @returns {Promise<boolean>}
     */
    async function requestMidiAccess() {
      try {
        if (!navigator.requestMIDIAccess) {
          console.error('您的浏览器不支持Web MIDI API');
          alert('您的浏览器不支持Web MIDI API，无法使用MIDI设备功能');
          return false;
        }
        
        midiProps.access = await navigator.requestMIDIAccess();
        console.log('MIDI访问权限已获取');
        
        midiProps.access.onstatechange = (event) => {
          console.log('MIDI设备状态变化:', event.port.name, event.port.state);
          refreshMidiDevices();
        };
        
        refreshMidiDevices();
        return true;
      } catch (error) {
        console.error('获取MIDI访问权限失败:', error);
        alert('获取MIDI访问权限失败，请确保您的浏览器支持Web MIDI API');
        return false;
      }
    }
    
    /**
     * 刷新MIDI设备列表（包含蓝牙设备）
     */
    function refreshMidiDevices() {
      if (!midiProps.access) return;
      
      midiDeviceSelect.innerHTML = '<option value="">-- 请选择MIDI设备 --</option>';
      const prevInputs = [...midiProps.inputs];
      midiProps.inputs = [];
      
      const wiredInputs = [];
      const bluetoothInputs = [];
      
      // 收集系统有线设备
      const inputs = midiProps.access.inputs.values();
      for (const input of inputs) {
        const name = input.name.toLowerCase();
        const isBluetooth = name.includes('bluetooth') || name.includes('蓝牙');
        if (isBluetooth) {
          bluetoothInputs.push({ ...input, isBluetooth: true });
        } else {
          wiredInputs.push({ ...input, isBluetooth: false });
        }
      }
      
      // 添加已连接的蓝牙设备（如果存在）
      if (midiProps.isBluetoothConnected && midiProps.bluetoothDevice) {
        if (!bluetoothInputs.some(d => d.id === 'bluetooth-midi')) {
          bluetoothInputs.push({
            id: 'bluetooth-midi',
            name: `蓝牙 MIDI (${midiProps.bluetoothDevice.name || '未知'})`,
            isBluetooth: true,
            state: 'connected'
          });
        }
      }
      
      // 决定显示哪些设备（有线优先模式下，有线存在时只显示有线 + 已连接的蓝牙）
      let displayInputs = [];
      if (midiProps.preferWired && wiredInputs.length > 0) {
        displayInputs = wiredInputs;
        if (midiProps.isBluetoothConnected) {
          displayInputs = [...displayInputs, ...bluetoothInputs];
        }
      } else {
        displayInputs = [...wiredInputs, ...bluetoothInputs];
      }
      
      // 生成下拉选项
      for (const input of displayInputs) {
        midiProps.inputs.push(input);
        const option = document.createElement('option');
        option.value = input.id;
        
        const isBluetooth = input.isBluetooth;
        // 有线存在时，蓝牙设备（非当前已连接）禁用
        const disableBluetooth = midiProps.preferWired && wiredInputs.length > 0 && isBluetooth && input.id !== 'bluetooth-midi';
        
        let deviceType = isBluetooth ? ' (蓝牙)' : ' (有线)';
        option.textContent = input.name + deviceType + (input === midiProps.selectedInput ? ' (当前)' : '');
        
        if (disableBluetooth) {
          option.disabled = true;
        }
        
        if (input === midiProps.selectedInput) {
          option.selected = true;
        }
        
        midiDeviceSelect.appendChild(option);
      }
      
      // 如果没有选中设备但有蓝牙已连接，自动选中蓝牙
      if (!midiProps.selectedInput && midiProps.isBluetoothConnected) {
        const btInput = midiProps.inputs.find(i => i.id === 'bluetooth-midi');
        if (btInput) {
          midiProps.selectedInput = btInput;
        }
      }
      
      // 更新设备状态显示
      if (midiProps.selectedInput && midiProps.selectedInput.state === 'connected') {
        midiDeviceStatus.textContent = '已连接';
        midiDeviceStatus.className = 'text-sm font-mono midi-connected';
      } else {
        midiDeviceStatus.textContent = '未连接';
        midiDeviceStatus.className = 'text-sm font-mono midi-disconnected';
      }
      
      updateMidiStatus();
    }
    
    /**
     * 选择MIDI设备
     * @param {string} deviceId
     */
    function selectMidiDevice(deviceId) {
      if (!midiProps.access) return;
      
      const newInput = midiProps.inputs.find(input => input.id === deviceId) || null;
      
      // 有线优先：禁止选择蓝牙设备（除非无有线）
      if (midiProps.preferWired && newInput && newInput.isBluetooth) {
        const hasWired = midiProps.inputs.some(input => !input.isBluetooth && input.state === 'connected');
        if (hasWired && newInput.id !== 'bluetooth-midi') {
          alert('当前有有线MIDI设备已连接，无法选择蓝牙设备。如需使用蓝牙，请先断开有线设备。');
          return;
        }
      }
      
      // 取消之前选中的设备监听
      if (midiProps.selectedInput && !midiProps.selectedInput.isBluetooth) {
        midiProps.selectedInput.onmidimessage = null;
      }
      
      midiProps.selectedInput = newInput;
      
      if (midiProps.selectedInput) {
        if (!midiProps.selectedInput.isBluetooth) {
          midiProps.selectedInput.onmidimessage = handleMidiMessage;
        }
        console.log(`已选择MIDI设备: ${midiProps.selectedInput.name}`);
        midiDeviceStatus.textContent = '已连接';
        midiDeviceStatus.className = 'text-sm font-mono midi-connected';
      } else {
        midiDeviceStatus.textContent = '未连接';
        midiDeviceStatus.className = 'text-sm font-mono midi-disconnected';
      }
      
      refreshMidiDevices();
      updateMidiStatus();
    }
    
    /**
     * 启用/禁用MIDI输入
     * @param {boolean} enabled
     */
    function toggleMidiInput(enabled) {
      midiProps.enabled = enabled;
      
      if (enabled) {
        requestMidiAccess().then(success => {
          if (!success) {
            enableMidiInputCheckbox.checked = false;
            midiProps.enabled = false;
          }
        });
      } else {
        if (midiProps.selectedInput && !midiProps.selectedInput.isBluetooth) {
          midiProps.selectedInput.onmidimessage = null;
        }
        midiProps.selectedInput = null;
        midiProps.access = null;
        
        midiProps.activeNotes.clear();
        pianoProps.keys.forEach(key => {
          key.element.classList.remove('midi-active');
        });
      }
      
      updateMidiStatus();
    }
    
    // ======================================================================
    // 4001-4050: 蓝牙 MIDI 相关函数（新增，参考节奏练习）
    // ======================================================================
    
    /**
     * 连接蓝牙 MIDI 设备
     */
    async function connectBluetoothMidi() {
      if (midiProps.preferWired && midiProps.inputs.some(input => !input.isBluetooth && input.state === 'connected')) {
        alert('当前有有线 MIDI 设备已连接，无法使用蓝牙 MIDI。请先断开有线设备。');
        return;
      }
      
      try {
        if (!navigator.bluetooth) {
          alert('您的浏览器不支持蓝牙功能，请使用 Chrome、Edge 或 Opera 浏览器。');
          return;
        }
        
        updateBluetoothStatus('正在搜索设备...', 'text-yellow-600');
        
        const device = await navigator.bluetooth.requestDevice({
          filters: [{
            services: ['03b80e5a-ede8-4b33-a751-6ce34ec4c700'] // MIDI 服务 UUID
          }],
          optionalServices: ['battery_service']
        });
        
        updateBluetoothStatus('正在连接...', 'text-yellow-600');
        
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService('03b80e5a-ede8-4b33-a751-6ce34ec4c700');
        const characteristic = await service.getCharacteristic('7772e5db-3868-4112-a1a9-f2669d106bf3'); // MIDI 数据特征
        
        midiProps.bluetoothDevice = device;
        midiProps.bluetoothCharacteristic = characteristic;
        midiProps.isBluetoothConnected = true;
        
        characteristic.addEventListener('characteristicvaluechanged', handleBluetoothMidiMessage);
        await characteristic.startNotifications();
        
        device.addEventListener('gattserverdisconnected', handleBluetoothDisconnect);
        
        updateBluetoothStatus(`已连接: ${device.name || '未知设备'}`, 'text-green-600');
        connectBluetoothMidiBtn.disabled = true;
        disconnectBluetoothMidiBtn.disabled = false;
        
        // 创建蓝牙输入对象
        const bluetoothInput = {
          id: 'bluetooth-midi',
          name: `蓝牙 MIDI (${device.name || '未知'})`,
          isBluetooth: true,
          state: 'connected'
        };
        
        // 移除旧的蓝牙设备（如果有）
        midiProps.inputs = midiProps.inputs.filter(input => !input.isBluetooth);
        midiProps.inputs.push(bluetoothInput);
        
        // 自动选中蓝牙设备（如果无有线）
        const hasWired = midiProps.inputs.some(input => !input.isBluetooth && input.state === 'connected');
        if (!hasWired) {
          midiProps.selectedInput = bluetoothInput;
          midiDeviceStatus.textContent = '已连接';
          midiDeviceStatus.className = 'text-sm font-mono midi-connected';
        }
        
        midiProps.enabled = true;
        enableMidiInputCheckbox.checked = true;
        
        refreshMidiDevices();
        updateMidiStatus();
        
        if (midiProps.debug) console.log('蓝牙 MIDI 连接成功:', device.name);
      } catch (error) {
        console.error('蓝牙 MIDI 连接失败:', error);
        if (error.name !== 'NotFoundError') {
          alert('蓝牙 MIDI 连接失败: ' + error.message);
        }
        updateBluetoothStatus('连接失败', 'text-red-600');
      }
    }
    
    /**
     * 断开蓝牙 MIDI 连接
     */
    function disconnectBluetoothMidi() {
      if (midiProps.bluetoothDevice && midiProps.bluetoothDevice.gatt.connected) {
        midiProps.bluetoothDevice.gatt.disconnect();
      }
      handleBluetoothDisconnect();
    }
    
    /**
     * 处理蓝牙设备断开
     */
    function handleBluetoothDisconnect() {
      midiProps.isBluetoothConnected = false;
      midiProps.bluetoothDevice = null;
      midiProps.bluetoothCharacteristic = null;
      
      // 从 inputs 中移除蓝牙设备
      midiProps.inputs = midiProps.inputs.filter(input => !input.isBluetooth);
      
      if (midiProps.selectedInput && midiProps.selectedInput.isBluetooth) {
        midiProps.selectedInput = null;
        midiDeviceStatus.textContent = '未连接';
        midiDeviceStatus.className = 'text-sm font-mono midi-disconnected';
      }
      
      updateBluetoothStatus('未连接', 'text-gray-400');
      connectBluetoothMidiBtn.disabled = false;
      disconnectBluetoothMidiBtn.disabled = true;
      
      refreshMidiDevices();
      updateMidiStatus();
      
      console.log('蓝牙 MIDI 已断开');
    }
    
    /**
     * 处理蓝牙 MIDI 消息（来自 characteristic）
     */
    function handleBluetoothMidiMessage(event) {
      const value = event.target.value;
      const data = new Uint8Array(value.buffer);
      const now = Date.now();
      
      // 简单的去抖动：忽略过快重复消息（10ms内）
      if (now - midiProps.lastBluetoothMessageTime < 10) return;
      midiProps.lastBluetoothMessageTime = now;
      
      if (midiProps.debug) console.log('蓝牙原始数据:', data);
      
      // 解析 MIDI 消息：数据可能包含多个 MIDI 事件，每个事件 3 字节
      // 简单处理：遍历每 3 字节作为一个消息
      for (let i = 0; i + 2 < data.length; i += 3) {
        const status = data[i];
        const note = data[i+1];
        const velocity = data[i+2];
        
        // 只处理音符开
        if ((status & 0xF0) === 0x90 && velocity > 0) {
          processMidiNote(new Uint8Array([status, note, velocity]), true);
        }
        // 可选处理音符关，但这里忽略（由钢琴键超时处理或忽略）
      }
    }
    
    /**
     * 更新蓝牙状态显示
     * @param {string} text
     * @param {string} colorClass
     */
    function updateBluetoothStatus(text, colorClass) {
      if (bluetoothMidiStatus) {
        bluetoothMidiStatus.textContent = text || (midiProps.isBluetoothConnected ? '已连接' : '未连接');
        bluetoothMidiStatus.className = `text-sm font-mono ${colorClass || (midiProps.isBluetoothConnected ? 'text-green-600' : 'text-gray-400')}`;
      }
    }
    
    // ======================================================================
    // 原有其他函数（drawLines, randomMoveNote, 拖拽等）保持不变，此处省略
    // 实际代码中需完整保留
    // ======================================================================
    
    // ======================================================================
    // 4301-4350: 事件监听器设置 - MIDI设置（修改，添加蓝牙按钮事件）
    // ======================================================================
    
    // MIDI设置事件监听
    enableMidiInputCheckbox.addEventListener('change', () => {
      toggleMidiInput(enableMidiInputCheckbox.checked);
    });
    
    midiNoteCompareCheckbox.addEventListener('change', () => {
      midiProps.noteCompare = midiNoteCompareCheckbox.checked;
    });
    
    midiDeviceSelect.addEventListener('change', () => {
      selectMidiDevice(midiDeviceSelect.value);
    });
    
    midiRefreshBtn.addEventListener('click', () => {
      refreshMidiDevices();
    });
    
    // 蓝牙MIDI按钮事件
    connectBluetoothMidiBtn.addEventListener('click', connectBluetoothMidi);
    disconnectBluetoothMidiBtn.addEventListener('click', disconnectBluetoothMidi);
    
    // ======================================================================
    // 4751-4800: 初始化函数调用（修改，增加蓝牙检查和默认启用）
    // ======================================================================
    
    // 初始化显示值（原有）
    updateLinesValueDisplay();
    updateClefValueDisplay();
    updateNoteValueDisplay();
    updateTextValueDisplay();
    updatePianoValueDisplay();
    updateNonRepeatValueDisplay();
    
    updateNonRepeatMaxCount();
    
    drawLines();
    drawPiano();
    updatePositionDisplayStyle();
    updateRandomButtonDisplay();
    updateNonRepeatHistoryDisplay();
    updatePianoPosition();
    updateMidiStatus();
    updateBluetoothStatus();
    
    updateClefType(clefProps.type);
    
    window.addEventListener('load', () => {
      console.log('五线谱绘制工具已加载完成（蓝牙MIDI重写版）');
      setNonRepeatToMax();
      
      // 默认启用MIDI输入
      enableMidiInputCheckbox.checked = true;
      midiProps.enabled = true;
      
      // 检查蓝牙兼容性
      if (!navigator.bluetooth) {
        connectBluetoothMidiBtn.disabled = true;
        connectBluetoothMidiBtn.title = '您的浏览器不支持蓝牙功能';
      }
      
      // 自动请求MIDI访问
      requestMidiAccess();
    });
    
    // 页面关闭时断开蓝牙
    window.addEventListener('beforeunload', function() {
      if (midiProps.isBluetoothConnected && midiProps.bluetoothDevice) {
        midiProps.bluetoothDevice.gatt.disconnect();
      }
    });
    
    // ======================================================================
    // 注意：以上代码中省略了大量原有函数和样式，实际使用时必须将原文件的全部内容保留，
    // 并仅替换 / 插入上述修改部分。由于篇幅限制，此处仅给出关键修改。
    // 请将本代码块中的新增和修改部分合并到原HTML文件中对应位置。
    // ======================================================================
  </script>
